<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Missing Person Poster - Risima Jorison Maluleke</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cloudflare.com"></script>
</head>
<body>

  <!-- Main Poster Frame -->
  <div id="posterContainer" class="poster-canvas">
    
    <!-- Top Full-Width Alert Header -->
    <div class="poster-header">MISSING</div>
    
    <!-- Two-Column Layout Wrapper -->
    <div class="poster-content-split">
      
      <!-- LEFT COLUMN: BOTH OF YOUR IMAGES STACKED -->
      <div class="left-image-column">
        <div class="photo-container">
          <!-- First Picture -->
          <img src="risima.jpg" alt="Risima Jorison Maluleke Photo 1">
        </div>
        <div class="photo-container">
          <!-- Second Picture named profile.jpg -->
          <img src="profile.jpg" alt="Risima Jorison Maluleke Photo 2">
        </div>
      </div>
      
      <!-- RIGHT COLUMN: ALL THE TEXT WRITING -->
      <div class="right-text-column">
        <div class="person-name">Risima Jorison Maluleke</div>
        
        <div class="details-box">
          <p><strong>Height:</strong> 1.8m tall</p>
          <p><strong>Complexion:</strong> Chocolate brown</p>
          <p><strong>Clothes Worn:</strong> Royal blue tracksuit with a hoodie top, a dark green beanie, and black shoes.</p>
        </div>
        
        <div class="contact-banner">
          IF YOU HAVE ANY INFORMATION, PLEASE CONTACT:
          <span class="phone-number">Sgt Mantwani:<br>061 489 3754</span>
          <span class="phone-number">Celia Maluleke:<br>082 784 0671</span>
          <span class="phone-number">Matlou:<br>076 248 9604</span>
        </div>
      </div>

    </div><!-- End of split layout -->
    
  </div>

  <!-- External Download Controller -->
  <div class="action-area">
    <button id="downloadBtn" class="download-button">💾 Download Poster as Image</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
